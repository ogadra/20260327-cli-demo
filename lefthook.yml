pre-commit:
  parallel: false
  commands:
    001_fmt_runner:
      root: "runner/"
      glob: "*.go"
      stage_fixed: true
      run: gofmt -w {staged_files}
    002_fmt_check_runner:
      root: "runner/"
      glob: "*.go"
      run: gofmt -l {staged_files} | grep . && exit 1 || true
    003_vet_runner:
      root: "runner/"
      glob: "*.go"
      run: go vet ./...
    011_fmt_broker:
      root: "broker/"
      glob: "*.go"
      stage_fixed: true
      run: gofmt -w {staged_files}
    012_fmt_check_broker:
      root: "broker/"
      glob: "*.go"
      run: gofmt -l {staged_files} | grep . && exit 1 || true
    013_vet_broker:
      root: "broker/"
      glob: "*.go"
      run: go vet ./...
    004_gitleaks:
      run: gitleaks protect --staged
    005_trivy:
      glob: "Dockerfile"
      run: trivy config runner/ && trivy config broker/
