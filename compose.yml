services:
  nginx:
    image: nginx:1.29.6-alpine
    profiles:
      - nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  broker:
    build: broker/
    ports:
      - "8080:8080"
    environment:
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
    depends_on:
      dynamodb-local:
        condition: service_healthy
    profiles:
      - broker

  dynamodb-local:
    image: amazon/dynamodb-local:3.3.0
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3
    profiles:
      - broker
