services:
  nginx:
    build:
      context: nginx/
      args:
        NGINX_RESOLVER: 127.0.0.11
        BROKER_HOST: broker
      cache_from:
        - type=gha,scope=nginx
      cache_to:
        - type=gha,scope=nginx,mode=max
    depends_on:
      broker:
        condition: service_healthy
    profiles:
      - nginx
      - integration
    ports:
      - "${NGINX_PORT}:8080"

  broker:
    build:
      context: broker/
      cache_from:
        - type=gha,scope=broker
      cache_to:
        - type=gha,scope=broker,mode=max
    ports:
      - "${BROKER_PORT}:8080"
    env_file:
      - broker/.env.example
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
    profiles:
      - broker
      - integration

  broker-test:
    build:
      context: broker/
      target: test-integration
      cache_from:
        - type=gha,scope=broker
      cache_to:
        - type=gha,scope=broker,mode=max
    env_file:
      - broker/.env.example
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
    profiles:
      - test

  front:
    build:
      context: front/
      target: dev
      cache_from:
        - type=gha,scope=front
      cache_to:
        - type=gha,scope=front,mode=max
    ports:
      - "${FRONT_PORT}:5173"
    volumes:
      - ./front/src:/app/src:ro
      - ./front/index.html:/app/index.html:ro
      - ./front/vite.config.ts:/app/vite.config.ts:ro
    environment:
      VITE_API_TARGET: http://nginx:8080
    profiles:
      - front

  runner-1:
    build:
      context: runner/
      cache_from:
        - type=gha,scope=runner
      cache_to:
        - type=gha,scope=runner,mode=max
    env_file:
      - runner/.env.example
    depends_on:
      broker:
        condition: service_healthy
    profiles:
      - runner
      - integration

  runner-2:
    build:
      context: runner/
      cache_from:
        - type=gha,scope=runner
    env_file:
      - runner/.env.example
    depends_on:
      broker:
        condition: service_healthy
    profiles:
      - integration

  dynamodb-init:
    image: amazon/aws-cli:2.34.14@sha256:0a8bbdb160cbb09e357ba24533204e90a97e2e56beadf1730739644c2d5f1bdb
    entrypoint: ["sh", "/init/create-table.sh"]
    volumes:
      - ./init/create-table.sh:/init/create-table.sh:ro
    env_file:
      - broker/.env.example
    depends_on:
      dynamodb-local:
        condition: service_healthy
    profiles:
      - broker
      - test
      - integration

  dynamodb-local:
    image: amazon/dynamodb-local:3.3.0@sha256:d89f8fcc6b1a39cb35976c248ed42a28c66ae00dc043099210f5571e42648ab4
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 5s
      timeout: 5s
      retries: 3
    profiles:
      - broker
      - test
      - integration

  integration-test:
    build:
      context: integration/
      cache_from:
        - type=gha,scope=integration
      cache_to:
        - type=gha,scope=integration,mode=max
    environment:
      NGINX_URL: "http://nginx:8080"
      BROKER_URL: "http://broker:8080"
    depends_on:
      nginx:
        condition: service_started
      broker:
        condition: service_healthy
      runner-1:
        condition: service_started
      runner-2:
        condition: service_started
    profiles:
      - integration
