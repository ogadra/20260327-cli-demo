services:
  nginx:
    image: nginx:1.29.6-alpine
    profiles:
      - nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  broker:
    build: broker/
    ports:
      - "8080:8080"
    environment:
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
    depends_on:
      dynamodb-local:
        condition: service_healthy
    profiles:
      - broker

  broker-test:
    build:
      context: broker/
      target: test-integration
    environment:
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=ap-northeast-1
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
    depends_on:
      dynamodb-local:
        condition: service_healthy
    profiles:
      - test

  front:
    build:
      context: front/
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./front/src:/app/src:ro
      - ./front/index.html:/app/index.html:ro
      - ./front/vite.config.ts:/app/vite.config.ts:ro
    profiles:
      - front

  runner:
    build: runner/
    ports:
      - "3000:3000"
    profiles:
      - runner

  dynamodb-local:
    image: amazon/dynamodb-local:3.3.0
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 5s
      timeout: 5s
      retries: 3
    profiles:
      - broker
      - test
