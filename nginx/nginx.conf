worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name _;

        resolver 127.0.0.11 valid=10s;

        location /health {
            access_log off;
            default_type text/plain;
            return 200 'OK';
        }

        location = /api/execute {
            auth_request /_resolve;
            auth_request_set $runner_url $upstream_http_x_runner_url;

            proxy_intercept_errors on;
            proxy_pass $runner_url$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /api/ {
            auth_request /_resolve;
            auth_request_set $runner_url $upstream_http_x_runner_url;

            proxy_intercept_errors on;
            proxy_pass $runner_url$request_uri;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        error_page 401 = @error_401;
        error_page 403 = @error_403;
        error_page 404 = @error_404;
        error_page 500 = @error_500;
        error_page 502 = @error_502;
        error_page 503 = @error_503;
        error_page 504 = @error_504;

        location @error_401 {
            default_type application/json;
            return 401 '{"code":"UNAUTHORIZED","message":"session cookie required"}';
        }

        location @error_403 {
            default_type application/json;
            return 403 '{"code":"FORBIDDEN","message":"session invalid"}';
        }

        location @error_404 {
            default_type application/json;
            return 404 '{"code":"SESSION_NOT_FOUND","message":"session not found"}';
        }

        location @error_500 {
            default_type application/json;
            return 500 '{"code":"INTERNAL_ERROR","message":"internal server error"}';
        }

        location @error_502 {
            default_type application/json;
            return 502 '{"code":"BAD_GATEWAY","message":"upstream unavailable"}';
        }

        location @error_503 {
            default_type application/json;
            return 503 '{"code":"SERVICE_UNAVAILABLE","message":"service temporarily unavailable"}';
        }

        location @error_504 {
            default_type application/json;
            return 504 '{"code":"GATEWAY_TIMEOUT","message":"upstream timeout"}';
        }

        location = /_resolve {
            internal;
            set $broker_upstream http://broker:8080;
            proxy_pass $broker_upstream/resolve;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
    }
}
