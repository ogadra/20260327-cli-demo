name: Deploy Front

on:
  workflow_run:
    workflows: ["Front"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-front
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # if: github.event.workflow_run.conclusion == 'success'
    if: false # deploy disabled: production environment removed
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ secrets.DEPLOY_FRONT_ROLE_ARN }}
          aws-region: ap-northeast-1
      - name: Build front assets
        run: |
          docker build --target build -t front-build front/
          docker create --name front-extract front-build
          docker cp front-extract:/app/dist ./dist
          docker rm front-extract
      - name: Verify dist directory
        run: |
          if [ ! -d "./dist" ] || [ -z "$(ls -A ./dist)" ]; then
            echo "Error: dist directory is empty or does not exist"
            exit 1
          fi
      - name: Sync to S3
        run: aws s3 sync ./dist "s3://${{ secrets.FRONT_S3_BUCKET }}" --delete
