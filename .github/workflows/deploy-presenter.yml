name: Deploy Presenter

on:
  workflow_run:
    workflows: ["Presenter"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-presenter
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    # if: github.event.workflow_run.conclusion == 'success'
    if: false # deploy disabled: production environment removed
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.DEPLOY_PRESENTER_ROLE_ARN }}
          aws-region: ap-northeast-1
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - name: Build and deploy Lambda functions
        run: |
          cd presenter
          for fn in connect disconnect message; do
            GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o bootstrap "./cmd/${fn}"
            zip "${fn}.zip" bootstrap
            rm bootstrap
            aws lambda update-function-code \
              --function-name "bunshin-presenter-ws-${fn}" \
              --zip-file "fileb://${fn}.zip"
            aws lambda wait function-updated \
              --function-name "bunshin-presenter-ws-${fn}"
          done
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o bootstrap "./cmd/login"
          zip "login.zip" bootstrap
          rm bootstrap
          aws lambda update-function-code \
            --function-name "bunshin-presenter-login" \
            --zip-file "fileb://login.zip"
          aws lambda wait function-updated \
            --function-name "bunshin-presenter-login"
