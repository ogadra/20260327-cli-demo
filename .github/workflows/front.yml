name: Front

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "front/**"
      - ".github/workflows/front.yml"

permissions:
  contents: read

jobs:
  check-front:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: front/pnpm-lock.yaml
      - name: Install dependencies
        run: cd front && pnpm install --frozen-lockfile
      - name: vp check
        run: cd front && pnpm exec vp check
      - name: vp lint --deny-warnings
        run: cd front && pnpm exec vp lint --deny-warnings

  test-front-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: front/pnpm-lock.yaml
      - name: Install dependencies
        run: cd front && pnpm install --frozen-lockfile
      - name: vp test
        run: cd front && pnpm exec vp test --run

  test-front:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run tests
        run: docker build -t front-test --target test front/
      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: image
          image-ref: front-test

  test-front-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run e2e tests
        run: docker build --target test-e2e front/

  build-front:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build
        run: docker build --target build front/
