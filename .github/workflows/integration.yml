name: Integration

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "broker/**"
      - "runner/**"
      - "nginx/**"
      - "integration/**"
      - "front/e2e-integration/**"
      - "front/playwright.integration*"
      - "compose.yml"
      - "init/**"
      - ".env.example"
      - ".github/workflows/integration.yml"

permissions:
  contents: read

jobs:
  integration-go:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Run integration tests
        run: docker compose --env-file .env.example --profile integration run --rm --build integration-test
      - name: Cleanup
        if: always()
        run: docker compose --env-file .env.example --profile integration down -v

  integration-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
      - name: Start services
        run: docker compose --env-file .env.example --profile integration --profile front up -d --build --scale integration-test=0
      - name: Install dependencies
        run: cd front && corepack enable && pnpm install --frozen-lockfile
      - name: Install Playwright
        run: cd front && pnpm exec playwright install --with-deps chromium
      - name: Wait for services
        run: .github/scripts/wait-for-services.sh
      - name: Run Playwright integration tests
        run: cd front && pnpm exec playwright test --config playwright.integration.config.ts
      - name: Cleanup
        if: always()
        run: docker compose --env-file .env.example --profile integration --profile front down -v
