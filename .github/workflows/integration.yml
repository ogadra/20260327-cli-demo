name: Integration

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "broker/**"
      - "runner/**"
      - "nginx/**"
      - "integration/**"
      - "front/e2e-integration/**"
      - "front/playwright.integration*"
      - "compose.yml"
      - "init/**"
      - ".env.example"
      - ".github/workflows/integration.yml"

permissions:
  contents: read

jobs:
  integration-go:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run integration tests
        run: docker compose --env-file .env.example --profile integration run --rm integration-test
      - name: Cleanup
        if: always()
        run: docker compose --env-file .env.example --profile integration down -v

  integration-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
      - name: Start services
        run: docker compose --env-file .env.example --profile integration --profile front up -d --build
      - name: Install dependencies
        run: cd front && corepack enable && pnpm install --frozen-lockfile
      - name: Install Playwright
        run: cd front && pnpm exec playwright install --with-deps chromium
      - name: Wait for services
        run: |
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 && break
            sleep 2
          done
          echo "Waiting for backend (session creation via nginx)..."
          for i in $(seq 1 60); do
            if curl -sf -X POST http://localhost:80/api/session -o /dev/null; then
              echo "Backend ready"
              exit 0
            fi
            sleep 3
          done
          echo "Backend not ready after 180s"
          docker compose --env-file .env.example --profile integration --profile front logs
          exit 1
      - name: Run Playwright integration tests
        run: cd front && pnpm exec playwright test --config playwright.integration.config.ts
      - name: Cleanup
        if: always()
        run: docker compose --env-file .env.example --profile integration --profile front down -v
